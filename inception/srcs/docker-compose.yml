version: '3.8'

services:
  mariadb:
    build:
      context: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: on-failure
    networks:
      - inception_net
    volumes:
      - db_data:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}

  wordpress:
    build:
      context: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: on-failure
    depends_on:
      - mariadb
    networks:
      - inception_net
    volumes:
      - wp_data:/var/www/html
    secrets:
      - db_password
      - wp_admin_password
      - wp_password
    env_file:
      - .env

  nginx:
    build:
      context: ./requirements/nginx
    image: nginx
    container_name: nginx
    restart: on-failure
    depends_on:
      - wordpress
    ports:
      - "443:443"
    networks:
      - inception_net
    volumes:
      - wp_data:/var/www/html

networks:
  inception_net:
    driver: bridge

volumes:
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ylau-sim/data/wordpress
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ylau-sim/data/mariadb

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt   # Ajuste le chemin ici aussi
  wp_password:
    file: ../secrets/wp_password.txt
